name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libasound2-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            patchelf

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Unit tests (frontend)
        run: pnpm test

      - name: Typecheck + build frontend
        run: pnpm build

      - name: Build whisper sidecar (Linux)
        run: bash sidecar/whisper/build-linux.sh

      - name: Rust tests
        run: cargo test --workspace

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: E2E tests
        run: pnpm test:e2e

  build:
    needs: [test]
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin
            tauri-args: --target universal-apple-darwin
          - platform: ubuntu-22.04
            rust-targets: ""
            tauri-args: ""
          - platform: windows-latest
            rust-targets: ""
            tauri-args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libasound2-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            patchelf

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - uses: Swatinem/rust-cache@v2

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build whisper sidecar (macOS)
        if: matrix.platform == 'macos-latest'
        run: bash sidecar/whisper/build-macos.sh

      - name: Build whisper sidecar (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: bash sidecar/whisper/build-linux.sh

      - name: Build whisper sidecar (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: ./sidecar/whisper/build-windows.ps1

      - name: Build app and create draft release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: "whispr-open v__VERSION__"
          releaseDraft: true
          args: ${{ matrix.tauri-args }}
